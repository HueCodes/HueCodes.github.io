<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - {{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0c0a10;
    }
    ::-webkit-scrollbar-thumb {
      background: #231e2e;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #4a2a5a;
    }

    /* Text selection */
    ::selection {
      background: rgba(180, 142, 173, 0.25);
      color: #d6d0e0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.65;
      color: #d6d0e0;
      background: #0c0a10;
      background-image:
        linear-gradient(rgba(35, 30, 46, 0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(35, 30, 46, 0.3) 1px, transparent 1px);
      background-size: 20px 20px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 50px 30px;
    }

    a {
      color: #b48ead;
      text-decoration: none;
      transition: color 0.15s ease;
    }

    a:hover {
      color: #d4b0cc;
    }

    /* --- Fade-in animation --- */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }

    /* --- Nav --- */
    nav {
      margin-bottom: 2rem;
      font-size: 14px;
      animation: fadeUp 0.4s ease forwards;
    }

    nav a {
      margin-right: 1.25rem;
      color: #7a6d8a;
      position: relative;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: #b48ead;
      transition: width 0.2s ease;
    }

    nav a:hover {
      color: #d6d0e0;
    }

    nav a:hover::after {
      width: 100%;
    }

    /* --- Intro --- */
    .intro {
      margin-bottom: 3rem;
      animation-delay: 0.05s;
    }

    .intro-header {
      display: flex;
      align-items: flex-start;
      gap: 1.5rem;
      margin-bottom: 1rem;
    }

    .photo {
      width: 110px;
      height: 110px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid #231e2e;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .photo:hover {
      border-color: rgba(180, 142, 173, 0.5);
      box-shadow: 0 0 20px rgba(180, 142, 173, 0.15);
    }

    .intro-header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: #d6d0e0;
    }

    .intro-header p {
      font-size: 15px;
      color: #a898b8;
      margin: 0 0 0.75rem 0;
    }

    .intro-header .tagline {
      font-size: 13px;
      color: #7a6d8a;
      border-left: 2px solid rgba(180, 142, 173, 0.4);
      padding-left: 10px;
    }

    .intro-header a {
      color: #b48ead;
    }

    /* --- Divider --- */
    .divider {
      border: none;
      border-top: 1px solid #231e2e;
      margin: 2rem 0;
    }

    /* --- Sections --- */
    .section {
      margin-bottom: 1.75rem;
      animation-delay: 0.1s;
    }

    .section h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #b48ead;
      margin-bottom: 0.5rem;
    }

    .section h2::before {
      content: '//';
      margin-right: 6px;
      opacity: 0.4;
      font-family: 'JetBrains Mono', monospace;
    }

    .section p {
      font-size: 14px;
      color: #a898b8;
      line-height: 1.65;
    }

    /* --- Projects grid --- */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 60px;
    }

    .project-card {
      background: #141118;
      border: 1px solid #231e2e;
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .project-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 20px rgba(180, 142, 173, 0.15), 0 8px 24px rgba(0, 0, 0, 0.4);
      border-color: rgba(180, 142, 173, 0.4);
    }

    .project-card img {
      width: 100%;
      height: 200px;
      object-fit: contain;
      display: block;
      border-bottom: 1px solid #231e2e;
      background: #0c0a10;
      padding: 10px;
    }

    /* Invert light-mode diagrams for dark background */
    .project-card img[src$=".svg"],
    .project-card img[src$=".png"] {
      filter: invert(0.85) hue-rotate(180deg);
    }

    /* Don't invert GIFs -- they're terminal recordings with dark backgrounds */
    .project-card img[src$=".gif"] {
      filter: none;
    }

    .card-content {
      padding: 12px;
    }

    .card-content h3 {
      margin: 0 0 3px 0;
      font-size: 15px;
      font-weight: 600;
    }

    .card-content h3 a {
      color: #d6d0e0;
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .card-content h3 a:hover {
      color: #b48ead;
    }

    .tagline {
      color: #7a6d8a;
      font-size: 12px;
      margin: 0 0 8px 0;
      font-style: italic;
    }

    .card-content ul {
      margin: 0 0 8px 0;
      padding-left: 16px;
      font-size: 11px;
      line-height: 1.5;
      color: #a898b8;
    }

    .card-content ul li {
      margin-bottom: 4px;
    }

    .card-content ul strong {
      color: #b48ead;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-weight: 500;
      font-size: 10.5px;
    }

    .tech {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin: 0;
    }

    .tech span {
      font-size: 10px;
      font-weight: 500;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      color: #7a6d8a;
      background: #0c0a10;
      padding: 2px 8px;
      border-radius: 12px;
      border: 1px solid #231e2e;
      white-space: nowrap;
      transition: border-color 0.15s ease, color 0.15s ease;
    }

    .project-card:hover .tech span {
      border-color: rgba(180, 142, 173, 0.2);
    }

    .blog-link {
      margin: 10px 0 0 0;
    }

    .blog-link a {
      display: inline-block;
      font-size: 12px;
      font-weight: 500;
      color: #0c0a10;
      background: #b48ead;
      padding: 5px 14px;
      border-radius: 4px;
      text-decoration: none;
      transition: background 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
    }

    .blog-link a:hover {
      background: #d4b0cc;
      color: #0c0a10;
      box-shadow: 0 0 12px rgba(180, 142, 173, 0.3);
      transform: translateX(2px);
    }

    /* --- OSS section --- */
    .oss {
      margin-top: 60px;
      animation-delay: 0.2s;
    }

    .oss h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #b48ead;
      margin: 0 0 20px 0;
      text-align: center;
    }

    .oss h2::before {
      content: '//';
      margin-right: 6px;
      opacity: 0.4;
      font-family: 'JetBrains Mono', monospace;
    }

    .oss-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .oss-item {
      padding: 18px;
      background: #141118;
      border-radius: 8px;
      border: 1px solid #231e2e;
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .oss-item:hover {
      transform: translateY(-3px);
      border-color: rgba(180, 142, 173, 0.4);
      box-shadow: 0 0 16px rgba(180, 142, 173, 0.1), 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .oss-item a {
      color: #b48ead;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
    }

    .oss-item p {
      margin: 6px 0 0 0;
      font-size: 13px;
      color: #7a6d8a;
      line-height: 1.5;
    }

    /* --- Footer --- */
    footer {
      margin-top: 60px;
      padding-top: 30px;
      border-top: 1px solid #231e2e;
      text-align: center;
      font-size: 13px;
      color: #4a2a5a;
    }

    footer a {
      color: #7a6d8a;
      text-decoration: none;
      transition: color 0.15s ease;
    }

    footer a:hover {
      color: #b48ead;
    }

    /* --- Filter tabs --- */
    .filter-tabs {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-bottom: 1.5rem;
      background: #141118;
      border: 1px solid #231e2e;
      border-radius: 8px;
      padding: 4px;
      display: inline-flex;
      margin-left: auto;
      margin-right: auto;
    }

    .grid-portfolio {
      text-align: center;
    }

    .grid-portfolio .projects-grid,
    .grid-portfolio .oss,
    .grid-portfolio footer {
      text-align: left;
    }

    .filter-btn {
      background: none;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #7a6d8a;
      cursor: pointer;
      padding: 6px 18px;
      font-family: inherit;
      transition: color 0.15s ease, background 0.15s ease;
    }

    .filter-btn.active {
      color: #d6d0e0;
      background: rgba(180, 142, 173, 0.1);
    }

    .filter-btn:hover {
      color: #d6d0e0;
    }

    /* Focus styles for keyboard navigation */
    a:focus-visible,
    .filter-btn:focus-visible {
      outline: 2px solid #b48ead;
      outline-offset: 2px;
      border-radius: 2px;
    }

    .oss-view-all {
      text-align: center;
      margin-top: 20px;
    }

    .oss-view-all a {
      color: #7a6d8a;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: color 0.15s ease;
    }

    .oss-view-all a:hover {
      color: #b48ead;
    }

    @media (max-width: 1400px) {
      .projects-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 1000px) {
      .projects-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      .projects-grid {
        grid-template-columns: 1fr;
      }
      .oss-grid {
        grid-template-columns: 1fr;
      }
      .intro-header {
        flex-direction: column;
      }
    }

    /* Reduce motion for accessibility */
    @media (prefers-reduced-motion: reduce) {
      .fade-in, nav {
        animation: none;
        opacity: 1;
      }
      .project-card, .oss-item, .blog-link a {
        transition: none;
      }
    }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>

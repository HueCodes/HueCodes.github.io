<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - {{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.65;
      color: #e6edf3;
      background: #0d1117;
      background-image:
        linear-gradient(rgba(48, 54, 61, 0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(48, 54, 61, 0.3) 1px, transparent 1px);
      background-size: 20px 20px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 50px 30px;
    }

    a {
      color: #00d4ff;
      text-decoration: none;
      transition: color 0.15s ease;
    }

    a:hover {
      color: #5ce6ff;
    }

    nav {
      margin-bottom: 2rem;
      font-size: 14px;
    }

    nav a {
      margin-right: 1.25rem;
      color: #8b949e;
    }

    nav a:hover {
      color: #e6edf3;
    }

    .intro {
      margin-bottom: 3rem;
    }

    .intro-header {
      display: flex;
      align-items: flex-start;
      gap: 1.25rem;
      margin-bottom: 1rem;
    }

    .photo {
      width: 110px;
      height: 110px;
      border-radius: 3px;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid #30363d;
    }

    .intro-header h1 {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 0.35rem;
      color: #f0f6fc;
    }

    .intro-header p {
      font-size: 15px;
      color: #c9d1d9;
      margin: 0 0 0.75rem 0;
    }

    .intro-header .tagline {
      font-size: 13px;
      color: #8b949e;
    }

    .intro-header a {
      color: #00d4ff;
    }

    .divider {
      border: none;
      border-top: 1px solid #21262d;
      margin: 2rem 0;
    }

    .section {
      margin-bottom: 1.75rem;
    }

    .section h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #00d4ff;
      margin-bottom: 0.5rem;
    }

    .section p {
      font-size: 14px;
      color: #8b949e;
      line-height: 1.65;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 60px;
    }

    .project-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .project-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.15), 0 8px 24px rgba(0, 0, 0, 0.4);
      border-color: rgba(0, 212, 255, 0.4);
    }

    .project-card img {
      width: 100%;
      height: 200px;
      object-fit: contain;
      display: block;
      border-bottom: 1px solid #30363d;
      background: #0d1117;
      padding: 10px;
    }

    /* Invert light-mode diagrams for dark background */
    .project-card img[src$=".svg"],
    .project-card img[src$=".png"] {
      filter: invert(0.85) hue-rotate(180deg);
    }

    /* Don't invert GIFs -- they're terminal recordings with dark backgrounds */
    .project-card img[src$=".gif"] {
      filter: none;
    }

    .card-content {
      padding: 12px;
    }

    .card-content h3 {
      margin: 0 0 3px 0;
      font-size: 15px;
      font-weight: 600;
    }

    .card-content h3 a {
      color: #f0f6fc;
      text-decoration: none;
    }

    .card-content h3 a:hover {
      color: #00d4ff;
    }

    .tagline {
      color: #8b949e;
      font-size: 12px;
      margin: 0 0 8px 0;
      font-style: italic;
    }

    .card-content ul {
      margin: 0 0 8px 0;
      padding-left: 16px;
      font-size: 11px;
      line-height: 1.5;
      color: #c9d1d9;
    }

    .card-content ul li {
      margin-bottom: 4px;
    }

    .card-content ul strong {
      color: #00d4ff;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-weight: 500;
      font-size: 10.5px;
    }

    .tech {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin: 0;
    }

    .tech span {
      font-size: 10px;
      font-weight: 500;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      color: #8b949e;
      background: #0d1117;
      padding: 2px 8px;
      border-radius: 12px;
      border: 1px solid #30363d;
      white-space: nowrap;
    }

    .blog-link {
      margin: 10px 0 0 0;
    }

    .blog-link a {
      display: inline-block;
      font-size: 12px;
      font-weight: 500;
      color: #0d1117;
      background: #00d4ff;
      padding: 5px 14px;
      border-radius: 4px;
      text-decoration: none;
      transition: background 0.15s ease, box-shadow 0.15s ease;
    }

    .blog-link a:hover {
      background: #5ce6ff;
      color: #0d1117;
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.3);
    }

    .oss {
      margin-top: 60px;
    }

    .oss h2 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 25px 0;
      text-align: center;
      color: #f0f6fc;
    }

    .oss-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .oss-item {
      padding: 15px;
      background: #161b22;
      border-radius: 6px;
      border: 1px solid #30363d;
      transition: border-color 0.15s ease;
    }

    .oss-item:hover {
      border-color: rgba(0, 212, 255, 0.4);
    }

    .oss-item a {
      color: #00d4ff;
      text-decoration: none;
      font-size: 15px;
    }

    .oss-item p {
      margin: 5px 0 0 0;
      font-size: 13px;
      color: #8b949e;
    }

    footer {
      margin-top: 60px;
      padding-top: 30px;
      border-top: 1px solid #21262d;
      text-align: center;
      font-size: 14px;
    }

    footer a {
      color: #00d4ff;
      text-decoration: none;
    }

    .filter-tabs {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .filter-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #484f58;
      cursor: pointer;
      padding: 0 0 2px 0;
      font-family: inherit;
      transition: color 0.15s ease, border-bottom-color 0.15s ease;
    }

    .filter-btn.active {
      color: #e6edf3;
      border-bottom-color: #00d4ff;
    }

    .filter-btn:hover {
      color: #e6edf3;
    }

    /* Focus styles for keyboard navigation */
    a:focus-visible,
    .filter-btn:focus-visible {
      outline: 2px solid #00d4ff;
      outline-offset: 2px;
      border-radius: 2px;
    }

    .oss-view-all {
      text-align: center;
      margin-top: 20px;
    }

    .oss-view-all a {
      color: #00d4ff;
      text-decoration: none;
      font-size: 14px;
    }

    @media (max-width: 1400px) {
      .projects-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 1000px) {
      .projects-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      .projects-grid {
        grid-template-columns: 1fr;
      }
      .oss-grid {
        grid-template-columns: 1fr;
      }
      .intro-header {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>

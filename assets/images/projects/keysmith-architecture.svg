<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="monospace" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>

  <rect width="800" height="400" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="400" y="30" fill="#e0e0e0" text-anchor="middle" font-size="16" font-weight="bold">keysmith reconciliation loop</text>

  <!-- SecretRotationPolicy CRD -->
  <rect x="30" y="60" width="180" height="70" fill="none" stroke="#6c63ff" stroke-width="2" rx="6"/>
  <text x="120" y="85" fill="#6c63ff" text-anchor="middle" font-weight="bold">SecretRotationPolicy</text>
  <text x="120" y="105" fill="#aaa" text-anchor="middle" font-size="11">schedule: "0 */6 * * *"</text>
  <text x="120" y="120" fill="#aaa" text-anchor="middle" font-size="11">provider: static</text>

  <!-- Arrow: CRD -> Controller -->
  <line x1="210" y1="95" x2="270" y2="95" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="240" y="87" fill="#666" text-anchor="middle" font-size="10">watch</text>

  <!-- Controller -->
  <rect x="275" y="55" width="160" height="80" fill="none" stroke="#00b4d8" stroke-width="2" rx="6"/>
  <text x="355" y="80" fill="#00b4d8" text-anchor="middle" font-weight="bold">Controller</text>
  <text x="355" y="98" fill="#aaa" text-anchor="middle" font-size="11">reconcile loop</text>
  <text x="355" y="114" fill="#aaa" text-anchor="middle" font-size="11">leader election</text>

  <!-- Arrow: Controller -> Provider -->
  <line x1="355" y1="135" x2="355" y2="175" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="375" y="160" fill="#666" font-size="10">rotate</text>

  <!-- Provider -->
  <rect x="275" y="180" width="160" height="65" fill="none" stroke="#e9c46a" stroke-width="2" rx="6"/>
  <text x="355" y="205" fill="#e9c46a" text-anchor="middle" font-weight="bold">Provider</text>
  <text x="355" y="225" fill="#aaa" text-anchor="middle" font-size="11">aws | vault | static</text>

  <!-- Arrow: Controller -> K8s Secret -->
  <line x1="435" y1="85" x2="530" y2="85" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="483" y="77" fill="#666" text-anchor="middle" font-size="10">update</text>

  <!-- K8s Secret -->
  <rect x="535" y="60" width="120" height="50" fill="none" stroke="#2a9d8f" stroke-width="2" rx="6"/>
  <text x="595" y="85" fill="#2a9d8f" text-anchor="middle" font-weight="bold">K8s Secret</text>
  <text x="595" y="100" fill="#aaa" text-anchor="middle" font-size="11">rotated credentials</text>

  <!-- Arrow: Controller -> Workloads -->
  <line x1="435" y1="110" x2="530" y2="150" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="125" fill="#666" font-size="10">restart</text>

  <!-- Workloads -->
  <rect x="535" y="135" width="120" height="50" fill="none" stroke="#e76f51" stroke-width="2" rx="6"/>
  <text x="595" y="157" fill="#e76f51" text-anchor="middle" font-weight="bold">Workloads</text>
  <text x="595" y="175" fill="#aaa" text-anchor="middle" font-size="11">deploy / sts / ds</text>

  <!-- Arrow: Controller -> RotationRecord -->
  <line x1="355" y1="135" x2="180" y2="180" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="250" y="155" fill="#666" font-size="10">create</text>

  <!-- RotationRecord -->
  <rect x="30" y="170" width="180" height="70" fill="none" stroke="#f4a261" stroke-width="2" rx="6"/>
  <text x="120" y="195" fill="#f4a261" text-anchor="middle" font-weight="bold">RotationRecord</text>
  <text x="120" y="215" fill="#aaa" text-anchor="middle" font-size="11">phase: Succeeded</text>
  <text x="120" y="230" fill="#aaa" text-anchor="middle" font-size="11">duration: 142ms</text>

  <!-- Arrow: Controller -> Webhooks -->
  <line x1="435" y1="120" x2="530" y2="225" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="185" fill="#666" font-size="10">notify</text>

  <!-- Webhooks -->
  <rect x="535" y="210" width="120" height="50" fill="none" stroke="#c77dff" stroke-width="2" rx="6"/>
  <text x="595" y="232" fill="#c77dff" text-anchor="middle" font-weight="bold">Webhooks</text>
  <text x="595" y="250" fill="#aaa" text-anchor="middle" font-size="11">slack / pager</text>

  <!-- Arrow: Controller -> Metrics -->
  <line x1="355" y1="135" x2="355" y2="310" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Metrics -->
  <rect x="275" y="315" width="160" height="60" fill="none" stroke="#06d6a0" stroke-width="2" rx="6"/>
  <text x="355" y="340" fill="#06d6a0" text-anchor="middle" font-weight="bold">Prometheus</text>
  <text x="355" y="358" fill="#aaa" text-anchor="middle" font-size="11">rotations_total</text>
  <text x="355" y="370" fill="#aaa" text-anchor="middle" font-size="11">rotation_duration_seconds</text>

  <!-- Admission Webhooks -->
  <rect x="30" y="280" width="180" height="60" fill="none" stroke="#ff6b6b" stroke-width="2" rx="6"/>
  <text x="120" y="305" fill="#ff6b6b" text-anchor="middle" font-weight="bold">Admission Webhooks</text>
  <text x="120" y="323" fill="#aaa" text-anchor="middle" font-size="11">validate cron syntax</text>
  <text x="120" y="337" fill="#aaa" text-anchor="middle" font-size="11">default historyLimit</text>

  <!-- Arrow: Admission -> CRD -->
  <line x1="120" y1="280" x2="120" y2="135" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="140" y="210" fill="#666" font-size="10">gate</text>

</svg>

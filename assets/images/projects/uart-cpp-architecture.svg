<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="monospace" font-size="13">

  <!-- Background -->
  <rect width="760" height="400" fill="#0d1117"/>

  <!-- Column labels -->
  <text x="110" y="30" fill="#8b949e" text-anchor="middle" font-size="11">APPLICATION</text>
  <text x="380" y="30" fill="#8b949e" text-anchor="middle" font-size="11">ISR / RING BUFFERS</text>
  <text x="645" y="30" fill="#8b949e" text-anchor="middle" font-size="11">HARDWARE</text>

  <!-- Divider lines -->
  <line x1="240" y1="20" x2="240" y2="385" stroke="#21262d" stroke-width="1"/>
  <line x1="520" y1="20" x2="520" y2="385" stroke="#21262d" stroke-width="1"/>

  <!-- ── APPLICATION BLOCK ── -->
  <rect x="30" y="50" width="180" height="280" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="120" y="72" fill="#e6edf3" text-anchor="middle" font-size="12" font-weight="bold">Uart</text>

  <rect x="50" y="85" width="140" height="34" rx="4" fill="#1f2937" stroke="#374151"/>
  <text x="120" y="99" fill="#58a6ff" text-anchor="middle" font-size="11">send(byte)</text>
  <text x="120" y="113" fill="#8b949e" text-anchor="middle" font-size="10">push to TX buf</text>

  <rect x="50" y="133" width="140" height="34" rx="4" fill="#1f2937" stroke="#374151"/>
  <text x="120" y="147" fill="#58a6ff" text-anchor="middle" font-size="11">send(str)</text>
  <text x="120" y="161" fill="#8b949e" text-anchor="middle" font-size="10">loops over bytes</text>

  <rect x="50" y="240" width="140" height="34" rx="4" fill="#1f2937" stroke="#374151"/>
  <text x="120" y="254" fill="#3fb950" text-anchor="middle" font-size="11">receive()</text>
  <text x="120" y="268" fill="#8b949e" text-anchor="middle" font-size="10">spin on RX buf</text>

  <rect x="50" y="288" width="140" height="34" rx="4" fill="#1f2937" stroke="#374151"/>
  <text x="120" y="302" fill="#3fb950" text-anchor="middle" font-size="11">rx_ready()</text>
  <text x="120" y="316" fill="#8b949e" text-anchor="middle" font-size="10">non-blocking poll</text>

  <!-- ── RING BUFFERS + ISR BLOCK ── -->

  <!-- TX Ring Buffer -->
  <rect x="260" y="60" width="160" height="70" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1"/>
  <text x="340" y="80" fill="#58a6ff" text-anchor="middle" font-size="11" font-weight="bold">TX RingBuffer</text>
  <text x="340" y="96" fill="#8b949e" text-anchor="middle" font-size="10">uint8_t[256]  SPSC</text>
  <text x="340" y="112" fill="#8b949e" text-anchor="middle" font-size="10">volatile head / tail</text>

  <!-- RX Ring Buffer -->
  <rect x="260" y="255" width="160" height="70" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="340" y="275" fill="#3fb950" text-anchor="middle" font-size="11" font-weight="bold">RX RingBuffer</text>
  <text x="340" y="291" fill="#8b949e" text-anchor="middle" font-size="10">uint8_t[256]  SPSC</text>
  <text x="340" y="307" fill="#8b949e" text-anchor="middle" font-size="10">volatile head / tail</text>

  <!-- ISR block -->
  <rect x="270" y="155" width="140" height="80" rx="6" fill="#161b22" stroke="#d29922" stroke-width="1"/>
  <text x="340" y="176" fill="#d29922" text-anchor="middle" font-size="11" font-weight="bold">USART2_IRQHandler</text>
  <text x="340" y="193" fill="#8b949e" text-anchor="middle" font-size="10">TXE: pop TX buf -&gt; DR</text>
  <text x="340" y="208" fill="#8b949e" text-anchor="middle" font-size="10">RXNE: DR -&gt; push RX buf</text>
  <text x="340" y="223" fill="#8b949e" text-anchor="middle" font-size="10">ORE/FE/NE: SR+DR clear</text>

  <!-- NVIC label -->
  <text x="340" y="355" fill="#8b949e" text-anchor="middle" font-size="10">NVIC IRQ38  priority 5</text>
  <line x1="340" y1="340" x2="340" y2="335" stroke="#d29922" stroke-dasharray="4,3" stroke-width="1"/>
  <line x1="340" y1="235" x2="340" y2="255" stroke="#d29922" stroke-dasharray="4,3" stroke-width="1"/>

  <!-- ── HARDWARE BLOCK ── -->
  <rect x="540" y="50" width="190" height="280" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="635" y="72" fill="#e6edf3" text-anchor="middle" font-size="12" font-weight="bold">STM32F401xE</text>

  <!-- USART2 -->
  <rect x="558" y="85" width="154" height="50" rx="4" fill="#1f2937" stroke="#374151"/>
  <text x="635" y="103" fill="#e6edf3" text-anchor="middle" font-size="11">USART2</text>
  <text x="635" y="118" fill="#8b949e" text-anchor="middle" font-size="10">115200 8N1  APB1 42 MHz</text>

  <!-- GPIO pins -->
  <rect x="558" y="150" width="70" height="30" rx="4" fill="#1f2937" stroke="#58a6ff" stroke-width="1"/>
  <text x="593" y="163" fill="#58a6ff" text-anchor="middle" font-size="10">PA2 TX</text>
  <text x="593" y="175" fill="#8b949e" text-anchor="middle" font-size="9">AF7</text>

  <rect x="642" y="150" width="70" height="30" rx="4" fill="#1f2937" stroke="#3fb950" stroke-width="1"/>
  <text x="677" y="163" fill="#3fb950" text-anchor="middle" font-size="10">PA3 RX</text>
  <text x="677" y="175" fill="#8b949e" text-anchor="middle" font-size="9">AF7</text>

  <!-- RCC / PLL -->
  <rect x="558" y="200" width="154" height="60" rx="4" fill="#1f2937" stroke="#374151"/>
  <text x="635" y="218" fill="#e6edf3" text-anchor="middle" font-size="11">RCC / PLL</text>
  <text x="635" y="234" fill="#8b949e" text-anchor="middle" font-size="10">HSE 8 MHz -&gt; 84 MHz</text>
  <text x="635" y="249" fill="#8b949e" text-anchor="middle" font-size="10">M=8 N=336 P=4</text>

  <!-- ST-Link -->
  <rect x="558" y="278" width="154" height="40" rx="4" fill="#1f2937" stroke="#374151"/>
  <text x="635" y="295" fill="#e6edf3" text-anchor="middle" font-size="11">ST-Link USB</text>
  <text x="635" y="310" fill="#8b949e" text-anchor="middle" font-size="10">virtual COM port</text>

  <!-- ── ARROWS ── -->

  <!-- App send -> TX buf -->
  <line x1="190" y1="102" x2="258" y2="95" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- TX buf -> ISR -->
  <line x1="340" y1="130" x2="340" y2="153" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- ISR -> DR (TX) -->
  <line x1="412" y1="180" x2="556" y2="150" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- DR -> ISR (RX) -->
  <line x1="556" y1="168" x2="412" y2="205" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- ISR -> RX buf -->
  <line x1="340" y1="237" x2="340" y2="253" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- RX buf -> App receive -->
  <line x1="258" y1="285" x2="192" y2="260" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- TXEIE enable from send -->
  <path d="M190,110 Q225,140 268,168" fill="none" stroke="#d29922" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowYellow)"/>
  <text x="215" y="148" fill="#d29922" font-size="9">TXEIE</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
    </marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d29922"/>
    </marker>
  </defs>

  <!-- Legend -->
  <line x1="30" y1="370" x2="55" y2="370" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="60" y="374" fill="#8b949e" font-size="10">TX path</text>
  <line x1="110" y1="370" x2="135" y2="370" stroke="#3fb950" stroke-width="1.5"/>
  <text x="140" y="374" fill="#8b949e" font-size="10">RX path</text>
  <line x1="190" y1="370" x2="215" y2="370" stroke="#d29922" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="220" y="374" fill="#8b949e" font-size="10">interrupt enable</text>

</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <!-- MPU-6050 IMU -->
  <rect x="4" y="10" width="44" height="30" rx="3" fill="#0d2a4a" stroke="#1565c0" stroke-width="1.5"/>
  <text x="26" y="22" text-anchor="middle" fill="#90caf9" font-size="7" font-family="monospace">MPU-6050</text>
  <text x="26" y="31" text-anchor="middle" fill="#4a90c8" font-size="5" font-family="monospace">I2C 400kHz</text>
  <text x="26" y="38" text-anchor="middle" fill="#2a6090" font-size="4.5" font-family="monospace">14B burst</text>

  <!-- Arrow to filter -->
  <line x1="48" y1="25" x2="62" y2="25" stroke="#f9a825" stroke-width="1.2"/>
  <polygon points="62,22 62,28 68,25" fill="#f9a825"/>

  <!-- Complementary Filter -->
  <rect x="66" y="10" width="52" height="30" rx="3" fill="#0d2a0d" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="92" y="21" text-anchor="middle" fill="#a5d6a7" font-size="6" font-family="monospace">Complement.</text>
  <text x="92" y="29" text-anchor="middle" fill="#4a904a" font-size="6" font-family="monospace">Filter</text>
  <text x="92" y="38" text-anchor="middle" fill="#2a602a" font-size="5" font-family="monospace">alpha=0.98</text>

  <!-- Arrow to PID -->
  <line x1="118" y1="25" x2="132" y2="25" stroke="#f9a825" stroke-width="1.2"/>
  <polygon points="132,22 132,28 138,25" fill="#f9a825"/>

  <!-- PID Controller -->
  <rect x="136" y="4" width="58" height="42" rx="3" fill="#3e0808" stroke="#ef5350" stroke-width="2"/>
  <text x="165" y="16" text-anchor="middle" fill="#ff8a80" font-size="7" font-family="monospace">PID</text>
  <text x="165" y="25" text-anchor="middle" fill="#ef5350" font-size="5.5" font-family="monospace">1kHz TIM2 ISR</text>
  <text x="165" y="33" text-anchor="middle" fill="#c62828" font-size="4.5" font-family="monospace">D-on-measure</text>
  <text x="165" y="41" text-anchor="middle" fill="#c62828" font-size="4.5" font-family="monospace">anti-windup</text>

  <!-- Arrow down to PWM -->
  <line x1="165" y1="46" x2="165" y2="60" stroke="#f9a825" stroke-width="1.2"/>
  <polygon points="162,60 168,60 165,66" fill="#f9a825"/>

  <!-- PWM + Motor Driver -->
  <rect x="136" y="66" width="58" height="28" rx="3" fill="#002a26" stroke="#00695c" stroke-width="1.5"/>
  <text x="165" y="77" text-anchor="middle" fill="#80cbc4" font-size="6.5" font-family="monospace">TB6612FNG</text>
  <text x="165" y="86" text-anchor="middle" fill="#3a9090" font-size="5" font-family="monospace">20kHz PWM</text>

  <!-- Arrow to motor -->
  <line x1="165" y1="94" x2="165" y2="108" stroke="#f9a825" stroke-width="1.2"/>
  <polygon points="162,108 168,108 165,114" fill="#f9a825"/>

  <!-- DC Motor -->
  <circle cx="165" cy="124" r="13" fill="#1a0a2a" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="165" y="122" text-anchor="middle" fill="#ce93d8" font-size="6" font-family="monospace">DC</text>
  <text x="165" y="130" text-anchor="middle" fill="#7b1fa2" font-size="5" font-family="monospace">Motor</text>

  <!-- Feedback arrow from motor back to IMU -->
  <polyline points="152,124 26,124 26,40" stroke="#ab47bc" stroke-width="0.9" stroke-dasharray="3,2" fill="none"/>
  <polygon points="23,42 29,42 26,36" fill="#ab47bc"/>
  <text x="80" y="120" text-anchor="middle" fill="#ab47bc" font-size="4.5" font-family="monospace">physical coupling</text>

  <!-- UART CLI -->
  <rect x="4" y="60" width="44" height="28" rx="3" fill="#2a1000" stroke="#e65100" stroke-width="1.5"/>
  <text x="26" y="72" text-anchor="middle" fill="#ffcc80" font-size="7" font-family="monospace">UART CLI</text>
  <text x="26" y="82" text-anchor="middle" fill="#e65100" font-size="5" font-family="monospace">kp/ki/kd/step</text>

  <!-- CLI arrow to PID -->
  <line x1="48" y1="74" x2="92" y2="74" stroke="#e65100" stroke-width="0.9" stroke-dasharray="3,2"/>
  <line x1="92" y1="74" x2="92" y2="46" stroke="#e65100" stroke-width="0.9" stroke-dasharray="3,2"/>
  <line x1="92" y1="46" x2="136" y2="30" stroke="#e65100" stroke-width="0.9" stroke-dasharray="3,2"/>

  <!-- Info labels -->
  <text x="4" y="104" fill="#546e7a" font-size="5" font-family="monospace">STM32F411RE</text>
  <text x="4" y="113" fill="#546e7a" font-size="5" font-family="monospace">arm-none-eabi-gcc</text>
</svg>

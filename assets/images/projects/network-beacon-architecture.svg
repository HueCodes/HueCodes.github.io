<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="monospace">
  <rect width="800" height="400" fill="#0d1117"/>

  <!-- Sources -->
  <text x="70" y="30" text-anchor="middle" fill="#8b949e" font-size="11">sources</text>
  <rect x="15" y="50" width="110" height="40" rx="5" fill="none" stroke="#f85149" stroke-width="1.5"/>
  <text x="70" y="75" text-anchor="middle" fill="#c9d1d9" font-size="11">live pcap</text>
  <rect x="15" y="105" width="110" height="40" rx="5" fill="none" stroke="#f85149" stroke-width="1.5"/>
  <text x="70" y="130" text-anchor="middle" fill="#c9d1d9" font-size="11">pcap replay</text>

  <!-- Arrows to analyzer -->
  <line x1="125" y1="70" x2="195" y2="115" stroke="#30363d" stroke-width="1.5"/>
  <line x1="125" y1="125" x2="195" y2="135" stroke="#30363d" stroke-width="1.5"/>

  <!-- Analyzer -->
  <rect x="195" y="90" width="150" height="90" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="270" y="115" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold">analyzer</text>
  <text x="270" y="135" text-anchor="middle" fill="#8b949e" font-size="10">Tokio async</text>
  <text x="270" y="150" text-anchor="middle" fill="#8b949e" font-size="10">flow aggregation</text>
  <text x="270" y="165" text-anchor="middle" fill="#8b949e" font-size="10">10k flow capacity</text>

  <!-- Arrows from analyzer to detection -->
  <line x1="345" y1="115" x2="385" y2="65" stroke="#30363d" stroke-width="1.2"/>
  <line x1="345" y1="125" x2="385" y2="115" stroke="#30363d" stroke-width="1.2"/>
  <line x1="345" y1="145" x2="385" y2="165" stroke="#30363d" stroke-width="1.2"/>
  <line x1="345" y1="155" x2="385" y2="215" stroke="#30363d" stroke-width="1.2"/>

  <!-- Detection -->
  <text x="455" y="30" text-anchor="middle" fill="#8b949e" font-size="11">detection</text>
  <rect x="385" y="45" width="140" height="40" rx="5" fill="none" stroke="#d29922" stroke-width="1.5"/>
  <text x="455" y="70" text-anchor="middle" fill="#c9d1d9" font-size="11">CV jitter (beaconing)</text>
  <rect x="385" y="95" width="140" height="40" rx="5" fill="none" stroke="#d29922" stroke-width="1.5"/>
  <text x="455" y="120" text-anchor="middle" fill="#c9d1d9" font-size="11">JA4 TLS fingerprint</text>
  <rect x="385" y="145" width="140" height="40" rx="5" fill="none" stroke="#d29922" stroke-width="1.5"/>
  <text x="455" y="170" text-anchor="middle" fill="#c9d1d9" font-size="11">DNS tunneling</text>
  <rect x="385" y="195" width="140" height="40" rx="5" fill="none" stroke="#d29922" stroke-width="1.5"/>
  <text x="455" y="220" text-anchor="middle" fill="#c9d1d9" font-size="11">HTTP beaconing</text>

  <!-- Arrows from detection to output -->
  <line x1="525" y1="65" x2="620" y2="75" stroke="#30363d" stroke-width="1.2"/>
  <line x1="525" y1="115" x2="620" y2="125" stroke="#30363d" stroke-width="1.2"/>
  <line x1="525" y1="165" x2="620" y2="175" stroke="#30363d" stroke-width="1.2"/>
  <line x1="525" y1="215" x2="620" y2="225" stroke="#30363d" stroke-width="1.2"/>

  <!-- Output -->
  <text x="690" y="30" text-anchor="middle" fill="#8b949e" font-size="11">output</text>
  <rect x="620" y="55" width="140" height="40" rx="5" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <text x="690" y="80" text-anchor="middle" fill="#c9d1d9" font-size="11">Ratatui TUI</text>
  <rect x="620" y="105" width="140" height="40" rx="5" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <text x="690" y="130" text-anchor="middle" fill="#c9d1d9" font-size="11">webhook + syslog</text>
  <rect x="620" y="155" width="140" height="40" rx="5" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <text x="690" y="180" text-anchor="middle" fill="#c9d1d9" font-size="11">Prometheus metrics</text>
  <rect x="620" y="205" width="140" height="40" rx="5" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <text x="690" y="230" text-anchor="middle" fill="#c9d1d9" font-size="11">JSON / JSONL (SIEM)</text>

  <!-- Bottom labels -->
  <text x="400" y="305" text-anchor="middle" fill="#8b949e" font-size="11">profiles: paranoid · balanced · relaxed</text>
  <text x="400" y="325" text-anchor="middle" fill="#8b949e" font-size="11">GeoIP enrichment (MaxMind) · TOML config</text>
  <text x="400" y="360" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">Network-Beacon</text>
  <text x="400" y="378" text-anchor="middle" fill="#8b949e" font-size="10">C2 detection via traffic analysis and TLS fingerprinting</text>
</svg>

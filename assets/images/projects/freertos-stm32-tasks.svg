<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <!-- SENSOR task — blue -->
  <rect x="4" y="12" width="50" height="32" rx="3" fill="#0d2a4a" stroke="#1565c0" stroke-width="1.5"/>
  <text x="29" y="24" text-anchor="middle" fill="#90caf9" font-size="7" font-family="monospace">SENSOR</text>
  <text x="29" y="33" text-anchor="middle" fill="#4a90c8" font-size="5.5" font-family="monospace">P=2 · 512w</text>
  <text x="29" y="41" text-anchor="middle" fill="#2a6090" font-size="5" font-family="monospace">BME280 I2C</text>

  <!-- sensor_queue arrow — gold -->
  <line x1="54" y1="28" x2="72" y2="28" stroke="#f9a825" stroke-width="1.2"/>
  <polygon points="72,25 72,31 78,28" fill="#f9a825"/>
  <text x="65" y="24" text-anchor="middle" fill="#f9a825" font-size="4.5" font-family="monospace">q:4</text>

  <!-- PROCESSING task — green -->
  <rect x="76" y="12" width="50" height="32" rx="3" fill="#0d2a0d" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="101" y="24" text-anchor="middle" fill="#a5d6a7" font-size="7" font-family="monospace">PROCESS</text>
  <text x="101" y="33" text-anchor="middle" fill="#4a904a" font-size="5.5" font-family="monospace">P=2 · 512w</text>
  <text x="101" y="41" text-anchor="middle" fill="#2a602a" font-size="5" font-family="monospace">calibration</text>

  <!-- print_queue arrow — gold -->
  <line x1="126" y1="28" x2="144" y2="28" stroke="#f9a825" stroke-width="1.2"/>
  <polygon points="144,25 144,31 150,28" fill="#f9a825"/>
  <text x="136" y="24" text-anchor="middle" fill="#f9a825" font-size="4.5" font-family="monospace">q:8</text>

  <!-- UART TX task — teal -->
  <rect x="148" y="12" width="48" height="32" rx="3" fill="#002a26" stroke="#00695c" stroke-width="1.5"/>
  <text x="172" y="24" text-anchor="middle" fill="#80cbc4" font-size="7" font-family="monospace">UART TX</text>
  <text x="172" y="33" text-anchor="middle" fill="#3a9090" font-size="5.5" font-family="monospace">P=1 · 256w</text>
  <text x="172" y="41" text-anchor="middle" fill="#206060" font-size="5" font-family="monospace">115200</text>

  <!-- WATCHDOG task — red (high priority) -->
  <rect x="76" y="60" width="50" height="32" rx="3" fill="#3e0808" stroke="#ef5350" stroke-width="2"/>
  <text x="101" y="72" text-anchor="middle" fill="#ff8a80" font-size="7" font-family="monospace">WATCHDOG</text>
  <text x="101" y="81" text-anchor="middle" fill="#ef5350" font-size="5.5" font-family="monospace">P=4 · HIGH</text>
  <text x="101" y="89" text-anchor="middle" fill="#c62828" font-size="5" font-family="monospace">feeds IWDG</text>

  <!-- Supervision dashed lines — red -->
  <line x1="29" y1="44" x2="88" y2="60" stroke="#ef5350" stroke-width="0.9" stroke-dasharray="3,2" opacity="0.6"/>
  <line x1="101" y1="44" x2="101" y2="60" stroke="#ef5350" stroke-width="0.9" stroke-dasharray="3,2" opacity="0.6"/>
  <line x1="172" y1="44" x2="114" y2="60" stroke="#ef5350" stroke-width="0.9" stroke-dasharray="3,2" opacity="0.6"/>

  <!-- IWDG chip — dark red -->
  <rect x="148" y="63" width="36" height="26" rx="2" fill="#3e0808" stroke="#ef5350" stroke-width="1.2"/>
  <text x="166" y="74" text-anchor="middle" fill="#ff8a80" font-size="6.5" font-family="monospace">IWDG</text>
  <text x="166" y="83" text-anchor="middle" fill="#ef5350" font-size="5.5" font-family="monospace">2s timeout</text>
  <line x1="126" y1="76" x2="148" y2="76" stroke="#ef5350" stroke-width="1.2"/>
  <polygon points="148,73 148,79 154,76" fill="#ef5350"/>

  <!-- CLI task — orange -->
  <rect x="4" y="60" width="50" height="32" rx="3" fill="#2a1000" stroke="#e65100" stroke-width="1.5"/>
  <text x="29" y="72" text-anchor="middle" fill="#ffcc80" font-size="7" font-family="monospace">CLI</text>
  <text x="29" y="81" text-anchor="middle" fill="#e65100" font-size="5.5" font-family="monospace">P=2 · 512w</text>
  <text x="29" y="89" text-anchor="middle" fill="#a03800" font-size="5" font-family="monospace">UART shell</text>

  <!-- CLI → print_queue dashed — orange -->
  <polyline points="54,76 148,76" stroke="#e65100" stroke-width="0.9" fill="none" stroke-dasharray="3,2"/>

  <!-- ISR box — dashed purple -->
  <rect x="4" y="104" width="50" height="26" rx="3" fill="#1a0a2a" stroke="#7b1fa2" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="29" y="116" text-anchor="middle" fill="#ce93d8" font-size="6.5" font-family="monospace">UART RX ISR</text>
  <text x="29" y="125" text-anchor="middle" fill="#7b1fa2" font-size="5" font-family="monospace">xQueueSendFromISR</text>

  <!-- ISR → CLI — purple -->
  <line x1="29" y1="104" x2="29" y2="92" stroke="#ab47bc" stroke-width="0.9" stroke-dasharray="3,2"/>
  <polygon points="26,92 29,86 32,92" fill="#ab47bc"/>

  <!-- Info labels -->
  <text x="148" y="104" fill="#546e7a" font-size="5" font-family="monospace">heap_4 · 24KB</text>
  <text x="148" y="113" fill="#546e7a" font-size="5" font-family="monospace">configTICK=1ms</text>
  <text x="148" y="122" fill="#546e7a" font-size="5" font-family="monospace">STM32F411RE</text>
</svg>

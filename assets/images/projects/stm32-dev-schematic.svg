<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <!-- MCU body — navy blue -->
  <rect x="58" y="18" width="84" height="100" rx="3" fill="#1a237e" stroke="#283593" stroke-width="1.5"/>
  <!-- MCU label -->
  <text x="100" y="58" text-anchor="middle" fill="#e8eaf6" font-size="8.5" font-family="monospace">STM32F4</text>
  <text x="100" y="71" text-anchor="middle" fill="#9fa8da" font-size="6.5" font-family="monospace">Cortex-M4</text>
  <text x="100" y="82" text-anchor="middle" fill="#7986cb" font-size="6.5" font-family="monospace">168MHz</text>
  <text x="100" y="93" text-anchor="middle" fill="#5c6bc0" font-size="5.5" font-family="monospace">1MB Flash · 192KB SRAM</text>

  <!-- Left pin stubs -->
  <rect x="46" y="30" width="12" height="3.5" fill="#42a5f5"/>
  <rect x="46" y="44" width="12" height="3.5" fill="#66bb6a"/>
  <rect x="46" y="58" width="12" height="3.5" fill="#ffa726"/>
  <rect x="46" y="72" width="12" height="3.5" fill="#ab47bc"/>
  <rect x="46" y="86" width="12" height="3.5" fill="#26a69a"/>
  <rect x="46" y="100" width="12" height="3.5" fill="#ffca28"/>

  <!-- Right pin stubs -->
  <rect x="142" y="30" width="12" height="3.5" fill="#42a5f5"/>
  <rect x="142" y="44" width="12" height="3.5" fill="#66bb6a"/>
  <rect x="142" y="58" width="12" height="3.5" fill="#ffa726"/>
  <rect x="142" y="72" width="12" height="3.5" fill="#ef5350"/>
  <rect x="142" y="86" width="12" height="3.5" fill="#ab47bc"/>
  <rect x="142" y="100" width="12" height="3.5" fill="#26a69a"/>

  <!-- Left traces + labels — color-coded -->
  <line x1="10" y1="31" x2="46" y2="31" stroke="#42a5f5" stroke-width="1.2"/>
  <text x="8" y="35" text-anchor="end" fill="#42a5f5" font-size="6.5" font-family="monospace">UART</text>
  <line x1="10" y1="45" x2="46" y2="45" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="8" y="49" text-anchor="end" fill="#66bb6a" font-size="6.5" font-family="monospace">SPI</text>
  <line x1="10" y1="59" x2="46" y2="59" stroke="#ffa726" stroke-width="1.2"/>
  <text x="8" y="63" text-anchor="end" fill="#ffa726" font-size="6.5" font-family="monospace">I2C</text>
  <line x1="10" y1="73" x2="46" y2="73" stroke="#ab47bc" stroke-width="1.2"/>
  <text x="8" y="77" text-anchor="end" fill="#ab47bc" font-size="6.5" font-family="monospace">ADC</text>
  <line x1="10" y1="87" x2="46" y2="87" stroke="#26a69a" stroke-width="1.2"/>
  <text x="8" y="91" text-anchor="end" fill="#26a69a" font-size="6.5" font-family="monospace">PWM</text>
  <line x1="10" y1="101" x2="46" y2="101" stroke="#ffca28" stroke-width="1.2"/>
  <text x="8" y="105" text-anchor="end" fill="#ffca28" font-size="6.5" font-family="monospace">DAC</text>

  <!-- Right traces + labels — color-coded -->
  <line x1="154" y1="31" x2="190" y2="31" stroke="#42a5f5" stroke-width="1.2"/>
  <text x="192" y="35" fill="#42a5f5" font-size="6.5" font-family="monospace">GPIO</text>
  <line x1="154" y1="45" x2="190" y2="45" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="192" y="49" fill="#66bb6a" font-size="6.5" font-family="monospace">TIM</text>
  <line x1="154" y1="59" x2="190" y2="59" stroke="#ffa726" stroke-width="1.2"/>
  <text x="192" y="63" fill="#ffa726" font-size="6.5" font-family="monospace">DMA</text>
  <line x1="154" y1="73" x2="190" y2="73" stroke="#ef5350" stroke-width="1.2"/>
  <text x="192" y="77" fill="#ef5350" font-size="6.5" font-family="monospace">NVIC</text>
  <line x1="154" y1="87" x2="190" y2="87" stroke="#ab47bc" stroke-width="1.2"/>
  <text x="192" y="91" fill="#ab47bc" font-size="6.5" font-family="monospace">USB</text>
  <line x1="154" y1="101" x2="190" y2="101" stroke="#26a69a" stroke-width="1.2"/>
  <text x="192" y="105" fill="#26a69a" font-size="6.5" font-family="monospace">FPU</text>

  <!-- VCC rail — red -->
  <line x1="86" y1="8" x2="86" y2="18" stroke="#ef5350" stroke-width="1.5"/>
  <text x="86" y="7" text-anchor="middle" fill="#ef5350" font-size="6" font-family="monospace">3.3V</text>

  <!-- GND rail — gray with earth symbol -->
  <line x1="114" y1="118" x2="114" y2="130" stroke="#90a4ae" stroke-width="1.5"/>
  <line x1="107" y1="130" x2="121" y2="130" stroke="#90a4ae" stroke-width="1.5"/>
  <line x1="110" y1="133" x2="118" y2="133" stroke="#90a4ae" stroke-width="1.2"/>
  <line x1="112" y1="136" x2="116" y2="136" stroke="#90a4ae" stroke-width="0.9"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="monospace">
  <rect width="800" height="400" fill="#0d1117"/>

  <!-- Drones -->
  <rect x="30" y="60" width="120" height="50" rx="6" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="90" y="90" text-anchor="middle" fill="#c9d1d9" font-size="13">Drone 1</text>
  <rect x="30" y="130" width="120" height="50" rx="6" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="90" y="160" text-anchor="middle" fill="#c9d1d9" font-size="13">Drone 2</text>
  <rect x="30" y="200" width="120" height="50" rx="6" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="90" y="230" text-anchor="middle" fill="#c9d1d9" font-size="13">Drone N</text>
  <text x="90" y="40" text-anchor="middle" fill="#8b949e" font-size="11">MAVLink v2 UDP</text>

  <!-- Arrows to relay -->
  <line x1="150" y1="85" x2="250" y2="170" stroke="#30363d" stroke-width="1.5"/>
  <line x1="150" y1="155" x2="250" y2="170" stroke="#30363d" stroke-width="1.5"/>
  <line x1="150" y1="225" x2="250" y2="190" stroke="#30363d" stroke-width="1.5"/>

  <!-- UDP Relay core -->
  <rect x="250" y="120" width="180" height="120" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="340" y="155" text-anchor="middle" fill="#58a6ff" font-size="15" font-weight="bold">udp-relay</text>
  <text x="340" y="175" text-anchor="middle" fill="#8b949e" font-size="11">CRC-16 validation</text>
  <text x="340" y="192" text-anchor="middle" fill="#8b949e" font-size="11">rate limiting</text>
  <text x="340" y="209" text-anchor="middle" fill="#8b949e" font-size="11">drone registry</text>
  <text x="340" y="226" text-anchor="middle" fill="#8b949e" font-size="11">pub/sub hub</text>

  <!-- Outputs -->
  <line x1="430" y1="155" x2="530" y2="90" stroke="#30363d" stroke-width="1.5"/>
  <line x1="430" y1="180" x2="530" y2="180" stroke="#30363d" stroke-width="1.5"/>
  <line x1="430" y1="205" x2="530" y2="270" stroke="#30363d" stroke-width="1.5"/>

  <rect x="530" y="65" width="140" height="50" rx="6" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <text x="600" y="87" text-anchor="middle" fill="#c9d1d9" font-size="12">WebSocket</text>
  <text x="600" y="103" text-anchor="middle" fill="#8b949e" font-size="10">live telemetry</text>

  <rect x="530" y="155" width="140" height="50" rx="6" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <text x="600" y="177" text-anchor="middle" fill="#c9d1d9" font-size="12">REST API</text>
  <text x="600" y="193" text-anchor="middle" fill="#8b949e" font-size="10">drone state</text>

  <rect x="530" y="245" width="140" height="50" rx="6" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <text x="600" y="267" text-anchor="middle" fill="#c9d1d9" font-size="12">Prometheus</text>
  <text x="600" y="283" text-anchor="middle" fill="#8b949e" font-size="10">metrics</text>

  <!-- Port label -->
  <text x="340" y="290" text-anchor="middle" fill="#484f58" font-size="10">:14550 UDP ingest | :8080 HTTP | :9090 metrics</text>
</svg>

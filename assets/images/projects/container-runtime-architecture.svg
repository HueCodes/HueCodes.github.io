<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="monospace">
  <rect width="800" height="400" fill="#0d1117"/>

  <!-- Top row: lifecycle -->
  <text x="80" y="30" text-anchor="middle" fill="#8b949e" font-size="11">image</text>
  <rect x="20" y="50" width="120" height="80" rx="6" fill="none" stroke="#f85149" stroke-width="1.5"/>
  <text x="80" y="75" text-anchor="middle" fill="#c9d1d9" font-size="11">OCI image</text>
  <text x="80" y="95" text-anchor="middle" fill="#8b949e" font-size="10">manifest.json</text>
  <text x="80" y="110" text-anchor="middle" fill="#8b949e" font-size="10">layers (.tar.gz)</text>

  <line x1="140" y1="90" x2="200" y2="90" stroke="#30363d" stroke-width="1.5"/>

  <text x="270" y="30" text-anchor="middle" fill="#8b949e" font-size="11">storage</text>
  <rect x="200" y="50" width="140" height="80" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="270" y="75" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">OverlayFS</text>
  <text x="270" y="95" text-anchor="middle" fill="#8b949e" font-size="10">lower (image)</text>
  <text x="270" y="108" text-anchor="middle" fill="#8b949e" font-size="10">upper (writable)</text>
  <text x="270" y="121" text-anchor="middle" fill="#8b949e" font-size="10">merged (rootfs)</text>

  <line x1="340" y1="90" x2="400" y2="90" stroke="#30363d" stroke-width="1.5"/>

  <text x="480" y="30" text-anchor="middle" fill="#8b949e" font-size="11">isolation</text>
  <rect x="400" y="50" width="160" height="80" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="480" y="75" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">clone() namespaces</text>
  <text x="480" y="95" text-anchor="middle" fill="#8b949e" font-size="10">PID · mount · UTS</text>
  <text x="480" y="108" text-anchor="middle" fill="#8b949e" font-size="10">IPC · net · user</text>
  <text x="480" y="121" text-anchor="middle" fill="#8b949e" font-size="10">pivot_root to rootfs</text>

  <line x1="560" y1="90" x2="620" y2="90" stroke="#30363d" stroke-width="1.5"/>

  <text x="700" y="30" text-anchor="middle" fill="#8b949e" font-size="11">running container</text>
  <rect x="620" y="50" width="160" height="80" rx="6" fill="none" stroke="#3fb950" stroke-width="2"/>
  <text x="700" y="80" text-anchor="middle" fill="#c9d1d9" font-size="12">isolated process</text>
  <text x="700" y="100" text-anchor="middle" fill="#8b949e" font-size="10">on overlay rootfs</text>
  <text x="700" y="115" text-anchor="middle" fill="#8b949e" font-size="10">in private namespaces</text>

  <!-- Enforcement: bottom row -->
  <text x="400" y="195" text-anchor="middle" fill="#8b949e" font-size="11">resource limits and security hardening</text>

  <rect x="120" y="215" width="160" height="60" rx="6" fill="none" stroke="#d29922" stroke-width="1.5"/>
  <text x="200" y="240" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="bold">cgroups v2</text>
  <text x="200" y="260" text-anchor="middle" fill="#8b949e" font-size="10">memory · cpu · pids</text>

  <rect x="320" y="215" width="160" height="60" rx="6" fill="none" stroke="#d29922" stroke-width="1.5"/>
  <text x="400" y="240" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="bold">seccomp BPF</text>
  <text x="400" y="260" text-anchor="middle" fill="#8b949e" font-size="10">syscall allowlist</text>

  <rect x="520" y="215" width="160" height="60" rx="6" fill="none" stroke="#d29922" stroke-width="1.5"/>
  <text x="600" y="240" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="bold">capabilities</text>
  <text x="600" y="260" text-anchor="middle" fill="#8b949e" font-size="10">drop · no_new_privs</text>

  <!-- Bottom info -->
  <text x="400" y="335" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">Container-runtime-rs</text>
  <text x="400" y="355" text-anchor="middle" fill="#8b949e" font-size="10">Rust · 900+ source files · OCI runtime spec compliant</text>
  <text x="400" y="375" text-anchor="middle" fill="#8b949e" font-size="10">Docker-comparable container lifecycle</text>
</svg>
